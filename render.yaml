services:
  - type: web
    name: hot-news-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate && python manage.py seed_sources && python manage.py create_superadmin && python manage.py import_news --limit 8 && gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      # Superadmin is created on deploy. Username/email are public; set the
      # PASSWORD in the Render dashboard (kept out of git). Until it is set the
      # step skips safely. Change the password after first login.
      - key: SUPERADMIN_USERNAME
        value: admin
      - key: SUPERADMIN_EMAIL
        value: admin@genzflash.app
      - key: SUPERADMIN_PASSWORD
        sync: false
      - key: DJANGO_ALLOWED_HOSTS
        value: hot-news-backend.onrender.com
      - key: DJANGO_CORS_ALLOWED_ORIGINS
        value: https://hot-news-frontend.onrender.com
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: https://hot-news-backend.onrender.com,https://hot-news-frontend.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: hot-news-db
          property: connectionString

  - type: web
    name: hot-news-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NEXT_PUBLIC_API_BASE
        value: https://hot-news-backend.onrender.com/api

databases:
  - name: hot-news-db
    plan: free
    databaseName: hot_news
    user: hot_news
