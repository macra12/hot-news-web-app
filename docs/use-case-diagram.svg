<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="740" viewBox="0 0 1500 740" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="tri" markerWidth="16" markerHeight="16" refX="13" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M1,1 L13,6 L1,11 Z" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
    </marker>
  </defs>

  <rect width="1500" height="740" fill="#ffffff"/>
  <text x="40" y="46" font-size="22" font-weight="800" fill="#0f172a">Use Case Diagram</text>

  <!-- ===================== SYSTEM BOUNDARY ===================== -->
  <rect x="300" y="80" width="1000" height="620" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="8 6"/>

  <!-- ===================== USE CASES (left = reader) ===================== -->
  <g fill="#eff6ff" stroke="#3b82f6" stroke-width="2">
    <ellipse cx="565" cy="140" rx="145" ry="33"/>
    <ellipse cx="565" cy="240" rx="145" ry="33"/>
    <ellipse cx="565" cy="340" rx="145" ry="33"/>
    <ellipse cx="565" cy="440" rx="145" ry="33"/>
    <ellipse cx="565" cy="540" rx="145" ry="33"/>
    <ellipse cx="565" cy="640" rx="145" ry="33"/>
  </g>
  <g font-size="15.5" fill="#1e3a8a" text-anchor="middle" font-weight="600">
    <text x="565" y="145">Browse latest &amp; trending</text>
    <text x="565" y="245">Browse by category</text>
    <text x="565" y="345">Search news</text>
    <text x="565" y="445">Read full article</text>
    <text x="565" y="545">Switch language &amp; theme</text>
    <text x="565" y="645">Register / Log in</text>
  </g>

  <!-- ===================== USE CASES (right = admin / system) ===================== -->
  <g fill="#dcfce7" stroke="#16a34a" stroke-width="2">
    <ellipse cx="1035" cy="140" rx="145" ry="33"/>
    <ellipse cx="1035" cy="240" rx="145" ry="33"/>
    <ellipse cx="1035" cy="340" rx="145" ry="33"/>
    <ellipse cx="1035" cy="440" rx="145" ry="33"/>
    <ellipse cx="1035" cy="540" rx="145" ry="33"/>
  </g>
  <ellipse cx="1035" cy="640" rx="145" ry="33" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <g font-size="15.5" text-anchor="middle" font-weight="600">
    <text x="1035" y="145" fill="#14532d">Manage articles</text>
    <text x="1035" y="245" fill="#14532d">Manage categories &amp; sources</text>
    <text x="1035" y="345" fill="#14532d">Manage users &amp; roles</text>
    <text x="1035" y="445" fill="#14532d">Upload media</text>
    <text x="1035" y="545" fill="#14532d">View analytics dashboard</text>
    <text x="1035" y="645" fill="#78350f">Import &amp; classify news</text>
  </g>

  <!-- ===================== ASSOCIATIONS ===================== -->
  <!-- Reader -> left use cases -->
  <g stroke="#94a3b8" stroke-width="1.6" fill="none">
    <path d="M158,360 L420,140"/>
    <path d="M158,360 L420,240"/>
    <path d="M158,360 L420,340"/>
    <path d="M158,360 L420,440"/>
    <path d="M158,360 L420,540"/>
    <path d="M158,360 L420,640"/>
  </g>

  <!-- Admin -> right use cases -->
  <g stroke="#94a3b8" stroke-width="1.6" fill="none">
    <path d="M1342,360 L1180,140"/>
    <path d="M1342,360 L1180,240"/>
    <path d="M1342,360 L1180,340"/>
    <path d="M1342,360 L1180,440"/>
    <path d="M1342,360 L1180,540"/>
    <path d="M1342,360 L1180,640"/>
  </g>

  <!-- Importer & Feeds -> Import & classify news -->
  <g stroke="#d97706" stroke-width="1.8" fill="none">
    <path d="M1342,560 L1180,640"/>
    <path d="M1342,665 L1180,650"/>
  </g>

  <!-- ===================== ACTORS ===================== -->
  <!-- Reader (left, top) -->
  <g stroke="#dc2626" stroke-width="2.4" fill="none" stroke-linecap="round">
    <circle cx="120" cy="300" r="15" fill="#fee2e2"/>
    <path d="M120,315 V356 M98,330 H142 M120,356 L102,382 M120,356 L138,382"/>
  </g>
  <text x="120" y="404" text-anchor="middle" font-size="16" font-weight="800" fill="#991b1b">Reader</text>

  <!-- Member (left, bottom) -->
  <g stroke="#dc2626" stroke-width="2.4" fill="none" stroke-linecap="round">
    <circle cx="120" cy="490" r="15" fill="#fee2e2"/>
    <path d="M120,505 V546 M98,520 H142 M120,546 L102,572 M120,546 L138,572"/>
  </g>
  <text x="120" y="594" text-anchor="middle" font-size="16" font-weight="800" fill="#991b1b">Member</text>

  <!-- Member --|> Reader generalization (is a) -->
  <path d="M120,475 V420" stroke="#334155" stroke-width="2" fill="none" marker-end="url(#tri)"/>
  <text x="132" y="450" font-size="12.5" font-style="italic" fill="#475569">«is a»</text>

  <!-- Admin (right, top) -->
  <g stroke="#16a34a" stroke-width="2.4" fill="none" stroke-linecap="round">
    <circle cx="1400" cy="300" r="15" fill="#dcfce7"/>
    <path d="M1400,315 V356 M1378,330 H1422 M1400,356 L1382,382 M1400,356 L1418,382"/>
  </g>
  <text x="1400" y="404" text-anchor="middle" font-size="16" font-weight="800" fill="#14532d">Admin /</text>
  <text x="1400" y="424" text-anchor="middle" font-size="16" font-weight="800" fill="#14532d">Reporter</text>

  <!-- News Importer (right, lower) -->
  <g stroke="#d97706" stroke-width="2.4" fill="none" stroke-linecap="round">
    <circle cx="1400" cy="500" r="15" fill="#fef3c7"/>
    <path d="M1400,515 V556 M1378,530 H1422 M1400,556 L1382,582 M1400,556 L1418,582"/>
  </g>
  <text x="1400" y="604" text-anchor="middle" font-size="14" font-weight="800" fill="#78350f">News Importer</text>
  <text x="1400" y="622" text-anchor="middle" font-size="11.5" fill="#92400e">(scheduled job)</text>

  <!-- External Feeds (right, bottom) -->
  <g stroke="#d97706" stroke-width="2.4" fill="none" stroke-linecap="round">
    <circle cx="1400" cy="660" r="15" fill="#fff7ed"/>
    <path d="M1400,675 V700 M1378,688 H1422"/>
  </g>
  <text x="1400" y="730" text-anchor="middle" font-size="13.5" font-weight="800" fill="#9a3412">News Feeds</text>

  <!-- ===================== LEGEND ===================== -->
  <text x="40" y="690" font-size="12.5" fill="#475569">──── association</text>
  <text x="40" y="712" font-size="12.5" fill="#475569">───▷ generalization (is a)</text>
</svg>
