<svg xmlns="http://www.w3.org/2000/svg" width="2048" height="1200" viewBox="0 0 2048 1200">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#444"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2d91ee"/>
    </marker>
    <style>
      .title { font: 700 66px Arial, Helvetica, sans-serif; fill: #050505; }
      .boundary-label { font: 700 24px Arial, Helvetica, sans-serif; fill: #222; }
      .actor-label { font: 18px Arial, Helvetica, sans-serif; fill: #555; text-anchor: middle; }
      .box-text { font: 16px Arial, Helvetica, sans-serif; fill: #333; text-anchor: middle; }
      .small-text { font: 13px Arial, Helvetica, sans-serif; fill: #555; text-anchor: middle; }
      .usecase { fill: #c9c8ff; stroke: #b4b2f5; stroke-width: 2; }
      .line { stroke: #444; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #444; stroke-width: 2; fill: none; stroke-dasharray: 9 8; marker-end: url(#arrow); }
      .actor { fill: none; stroke: #2d91ee; stroke-width: 12; stroke-linecap: round; stroke-linejoin: round; }
      .actor-fill { fill: #2d91ee; }
    </style>
  </defs>

  <rect width="2048" height="1200" fill="#fff"/>
  <text x="60" y="135" class="title">Use Case Diagram</text>

  <rect x="760" y="25" width="890" height="1135" rx="16" fill="#fff" stroke="#555" stroke-width="2"/>
  <text x="1205" y="62" class="boundary-label" text-anchor="middle">GenZFlash News System</text>

  <!-- Actor drawing template repeated manually -->
  <g transform="translate(660 485)">
    <circle cx="0" cy="-60" r="13" class="actor-fill"/>
    <path class="actor" d="M0 -42 L0 35 M-24 -18 L-24 25 M24 -18 L24 25 M0 35 L-20 82 M0 35 L20 82"/>
    <text x="0" y="122" class="actor-label">Visitor</text>
