<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="760" viewBox="0 0 1060 760" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#ef4444"/>
    </marker>
  </defs>

  <rect width="1060" height="760" fill="#ffffff"/>

  <!-- Title -->
  <text x="530" y="42" text-anchor="middle" font-size="26" font-weight="800" fill="#0f172a">GenZ Flash — Deployment Architecture</text>
  <text x="530" y="66" text-anchor="middle" font-size="13" fill="#64748b">Next.js + Django REST + PostgreSQL on Render, deployed from GitHub</text>

  <!-- GitHub (deploy trigger) -->
  <rect x="60" y="100" width="220" height="78" rx="12" fill="#111827" stroke="#111827"/>
  <text x="170" y="132" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">GitHub repository</text>
  <text x="170" y="152" text-anchor="middle" font-size="12" fill="#cbd5e1">macra12/hot-news-web-app</text>
  <text x="170" y="169" text-anchor="middle" font-size="11" fill="#9ca3af">branch: main</text>

  <!-- deploy arrow GitHub -> Render -->
  <path d="M280,139 H410 V150" fill="none" stroke="#ef4444" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <text x="345" y="130" text-anchor="middle" font-size="11" font-weight="700" fill="#ef4444">git push → auto deploy</text>
  <text x="345" y="186" text-anchor="middle" font-size="10" fill="#94a3b8">(Render reads render.yaml)</text>

  <!-- Render cloud -->
  <rect x="330" y="150" width="690" height="470" rx="20" fill="#f8fafc" stroke="#94a3b8" stroke-width="2" stroke-dasharray="7 5"/>
  <text x="356" y="180" font-size="15" font-weight="800" fill="#334155">☁ RENDER (cloud)</text>

  <!-- Frontend -->
  <rect x="370" y="210" width="250" height="110" rx="12" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="2"/>
  <text x="495" y="240" text-anchor="middle" font-size="16" font-weight="800" fill="#0c4a6e">FRONTEND</text>
  <text x="495" y="262" text-anchor="middle" font-size="12.5" fill="#075985">Next.js (Node) · npm start</text>
  <text x="495" y="282" text-anchor="middle" font-size="11.5" fill="#0369a1">hot-news-frontend.onrender.com</text>
  <text x="495" y="302" text-anchor="middle" font-size="10.5" fill="#64748b">build: npm ci &amp;&amp; npm run build</text>

  <!-- Backend -->
  <rect x="730" y="210" width="250" height="110" rx="12" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="855" y="240" text-anchor="middle" font-size="16" font-weight="800" fill="#7f1d1d">BACKEND</text>
  <text x="855" y="262" text-anchor="middle" font-size="12.5" fill="#991b1b">Django + DRF · gunicorn</text>
  <text x="855" y="282" text-anchor="middle" font-size="11.5" fill="#b91c1c">hot-news-backend.onrender.com</text>
  <text x="855" y="302" text-anchor="middle" font-size="10.5" fill="#64748b">migrate → seed → import → serve</text>

  <!-- Database -->
  <rect x="730" y="430" width="250" height="95" rx="12" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
  <text x="855" y="462" text-anchor="middle" font-size="16" font-weight="800" fill="#4c1d95">PostgreSQL</text>
  <text x="855" y="484" text-anchor="middle" font-size="12.5" fill="#5b21b6">hot-news-db (managed)</text>
  <text x="855" y="504" text-anchor="middle" font-size="10.5" fill="#64748b">articles · categories · users · search index</text>

  <!-- User browser -->
  <rect x="60" y="300" width="200" height="110" rx="12" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
  <text x="160" y="332" text-anchor="middle" font-size="16" font-weight="800" fill="#1e293b">User browser</text>
  <text x="160" y="354" text-anchor="middle" font-size="12" fill="#475569">desktop / mobile web</text>
  <text x="160" y="374" text-anchor="middle" font-size="11" fill="#64748b">EN / ខ្មែរ · light / dark</text>

  <!-- User <-> Frontend -->
  <path d="M260,345 H370" fill="none" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M370,378 H260" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="315" y="338" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">HTTPS</text>
  <text x="315" y="396" text-anchor="middle" font-size="10" fill="#64748b">HTML / JS</text>

  <!-- Frontend <-> Backend -->
  <path d="M620,255 H730" fill="none" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M730,290 H620" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="675" y="247" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">REST API</text>
  <text x="675" y="307" text-anchor="middle" font-size="10" fill="#64748b">JSON · CORS</text>

  <!-- Backend <-> DB -->
  <path d="M855,320 V430" fill="none" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="905" y="378" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">SQL</text>
  <text x="905" y="394" text-anchor="middle" font-size="10" fill="#64748b">DATABASE_URL</text>

  <!-- External sources -->
  <rect x="330" y="660" width="690" height="80" rx="14" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="675" y="688" text-anchor="middle" font-size="14" font-weight="800" fill="#9a3412">External news sources (RSS / public feeds)</text>
  <text x="675" y="712" text-anchor="middle" font-size="12" fill="#c2410c">BBC · Al Jazeera · The Guardian · Khmer Times · Google News (Cambodia)</text>
  <text x="675" y="730" text-anchor="middle" font-size="10.5" fill="#9a3412">conditional GET · de-dup by URL · freshness gate</text>

  <!-- Backend -> External (importer) -->
  <path d="M855,525 V660" fill="none" stroke="#f97316" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <text x="940" y="600" text-anchor="middle" font-size="11" font-weight="700" fill="#c2410c">import_news</text>
  <text x="940" y="616" text-anchor="middle" font-size="10" fill="#9a3412">fetch &amp; store</text>

  <!-- Legend / flow numbers -->
  <text x="60" y="470" font-size="12.5" font-weight="800" fill="#0f172a">Flow</text>
  <text x="60" y="492" font-size="11.5" fill="#334155">1 · Push to GitHub → Render rebuilds &amp; deploys both services.</text>
  <text x="60" y="510" font-size="11.5" fill="#334155">2 · Importer pulls feeds → stores clean, categorised articles in PostgreSQL.</text>
  <text x="60" y="528" font-size="11.5" fill="#334155">3 · User opens the site → frontend calls the REST API.</text>
  <text x="60" y="546" font-size="11.5" fill="#334155">4 · Backend queries the database → returns JSON → React renders the news.</text>
</svg>
